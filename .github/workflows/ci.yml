name: Android CI/CD

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '9.4.1'

      - name: Run Lint
        run: gradle lintDebug

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '9.4.1'

      - name: Run Unit Tests
        run: gradle testDebugUnitTest
        env:
          AZURE_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}
          AZURE_PROJECT_ID: ${{ secrets.AZURE_PROJECT_ID }}
          AZURE_ITERATION_NAME: ${{ secrets.AZURE_ITERATION_NAME }}
          AZURE_PREDICTION_KEY: ${{ secrets.AZURE_PREDICTION_KEY }}

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: app/build/test-results/testDebugUnitTest/

  build:
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '9.4.1'

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for code changes
        id: changed-files
        run: |
          if [ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]; then
            echo "code_changed=true" >> $GITHUB_OUTPUT
          else
            changed=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E '\.(kt|kts|xml|gradle)$|gradle\.properties' || true)
            if [ -n "$changed" ]; then
              echo "code_changed=true" >> $GITHUB_OUTPUT
            else
              echo "code_changed=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Set up JDK 17
        if: steps.changed-files.outputs.code_changed == 'true'
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        if: steps.changed-files.outputs.code_changed == 'true'
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '9.4.1'

      - name: Build Release App Bundle (AAB)
        if: steps.changed-files.outputs.code_changed == 'true'
        run: gradle bundleRelease

      - name: Upload Release Artifact
        if: steps.changed-files.outputs.code_changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: release-bundle
          path: app/build/outputs/bundle/release/*.aab
